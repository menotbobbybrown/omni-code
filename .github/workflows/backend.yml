name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:v0.5.1
        env:
          POSTGRES_USER: omnicode
          POSTGRES_PASSWORD: omnicode_password
          POSTGRES_DB: omnicode_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-asyncio pytest-cov
        pip install -r backend/requirements.txt
        
    - name: Lint with ruff
      run: |
        ruff check backend
        
    - name: Run tests
      env:
        DATABASE_URL: postgresql://omnicode:omnicode_password@localhost:5432/omnicode_test
        REDIS_URL: redis://localhost:6379
        ENCRYPTION_KEY: c3ByZW1lLWtleS1wbGVhc2UtY2hhbmdlLWluLXByb2R1Y3Rpb24=
        JWT_SECRET: dev-jwt-secret-at-least-16-characters
        ENVIRONMENT: development
      run: |
        cd backend
        pytest --cov=app tests/
