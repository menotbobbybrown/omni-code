[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx turbo run build",
  "if [ -d apps/web/public ]; then mkdir -p apps/web/.next/standalone/apps/web/public && cp -r apps/web/public/. apps/web/.next/standalone/apps/web/public/; fi",
  "if [ -d apps/web/.next/static ]; then mkdir -p apps/web/.next/standalone/apps/web/.next/static && cp -r apps/web/.next/static/. apps/web/.next/standalone/apps/web/.next/static/; fi"
]

[start]
cmd = "node apps/web/.next/standalone/apps/web/server.js"

[variables]
NIXPACKS_PATH = "/usr/local/bin:/usr/bin:/bin:/usr/local/games:/usr/games"
NODE_ENV = "production"
